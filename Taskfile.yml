version: "3"

tasks:
  run:
    desc: Run the app locally
    cmds:
      - go run . start --foreground

  build:
    desc: Build binary for current platform
    cmds:
      - go build -o togx .

  build:all:
    desc: Build release binaries for all targets
    cmds:
      - bash scripts/build-all.sh

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist togx togx.exe
