name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag and version consistency
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(tr -d '[:space:]' < VERSION)"
          pkgver="$(sed -n 's/^pkgver=//p' packaging/aur/PKGBUILD | head -n1)"

          if [ "$tag" != "$ver" ]; then
            echo "Tag version ($tag) does not match VERSION ($ver)"
            exit 1
          fi

          if [ "$ver" != "$pkgver" ]; then
            echo "VERSION ($ver) does not match PKGBUILD pkgver ($pkgver)"
            exit 1
          fi

          echo "Version check passed: tag=v$tag VERSION=$ver PKGBUILD=$pkgver"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build all targets
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
          REQUIRE_ANDROID_ARMV7: "1"
        run: bash scripts/build-all.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./*.tar.gz ./*.zip > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: todo-go-htmx-artifacts
          path: dist/

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          title="togx ${tag}"
          notes_file=".github/release-notes-${tag}.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            if [ -f "$notes_file" ]; then
              gh release edit "$tag" --title "$title" --notes-file "$notes_file"
            else
              gh release edit "$tag" --title "$title" --generate-notes
            fi
            gh release upload "$tag" dist/*.tar.gz dist/*.zip dist/checksums.txt --clobber
          else
            if [ -f "$notes_file" ]; then
              gh release create "$tag" --title "$title" --notes-file "$notes_file" dist/*.tar.gz dist/*.zip dist/checksums.txt
            else
              gh release create "$tag" --title "$title" --generate-notes dist/*.tar.gz dist/*.zip dist/checksums.txt
            fi
          fi
